<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1b"/>
      <stop offset="100%" stop-color="#0c0c0a"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8f07a"/>
      <stop offset="100%" stop-color="#7af0b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect x="1" y="1" width="178" height="178" rx="39" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="180" height="3" rx="1.5" fill="url(#dot)" opacity="0.6"/>

  <!-- Letter n -->
  <text
    x="22"
    y="136"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="120"
    font-weight="700"
    font-style="italic"
    fill="#f0ebe0"
    letter-spacing="-4"
  >n</text>

  <!-- Glow behind dot -->
  <circle cx="152" cy="130" r="28" fill="rgba(168,240,122,0.12)" filter="url(#glow)"/>
  <!-- Green dot -->
  <circle cx="152" cy="130" r="18" fill="url(#dot)"/>
  <!-- Dot highlight -->
  <circle cx="146" cy="123" r="5" fill="rgba(255,255,255,0.25)"/>
</svg>
